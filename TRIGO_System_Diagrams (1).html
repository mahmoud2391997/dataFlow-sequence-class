<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIGO — System Architecture Diagrams</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');
:root{
  --teal:#00C9A7;--teal2:#00876f;--teal-g:rgba(0,201,167,.14);--teal-g2:rgba(0,201,167,.06);
  --bg:#070b0a;--s1:#0e1512;--s2:#141c19;--s3:#1a2420;
  --border:rgba(0,201,167,.13);--text:#ddeae6;--dim:#5a7870;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500;backdrop-filter:blur(12px)}
.logo{font-size:22px;font-weight:800;color:var(--teal);letter-spacing:3px}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-family:'JetBrains Mono',monospace}
.badge{background:var(--teal-g);border:1px solid var(--teal);color:var(--teal);font-size:9px;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:20px;letter-spacing:1.5px}
.top-nav{display:flex;background:var(--s2);border-bottom:2px solid var(--border)}
.nav-btn{flex:1;padding:15px 20px;background:transparent;border:none;color:var(--dim);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .22s;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:-2px;letter-spacing:.5px;text-transform:uppercase}
.nav-btn:hover{color:var(--teal);background:var(--teal-g2)}
.nav-btn.active{color:var(--teal);border-bottom-color:var(--teal);background:rgba(0,201,167,.05)}
.nav-icon{font-size:18px}
.panel{display:none}.panel.active{display:block}
.diagram-scroll{overflow:auto;padding:32px 36px;min-height:calc(100vh - 120px)}
svg text{font-family:'JetBrains Mono',monospace}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:10px 36px;background:var(--s3);border-bottom:1px solid var(--border);align-items:center}
.leg-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-right:6px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.seq-tabs{display:flex;gap:4px;padding:12px 36px;background:var(--s2);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap}
.seq-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;letter-spacing:.5px}
.seq-tab:hover{border-color:var(--teal);color:var(--teal)}
.seq-tab.active{background:var(--teal);color:var(--bg);border-color:var(--teal);font-weight:700}
.seq-flow{display:none}.seq-flow.active{display:block}
.tt{position:fixed;background:var(--s1);border:1px solid var(--teal);border-radius:8px;padding:10px 14px;max-width:260px;font-size:10.5px;line-height:1.6;z-index:9999;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 28px rgba(0,0,0,.7);font-family:'JetBrains Mono',monospace}
.tt.show{opacity:1}
.tt-title{font-weight:700;color:var(--teal);margin-bottom:4px;font-size:11px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:#00876f;border-radius:2px}
</style>
</head>
<body>
<div class="tt" id="tooltip"><div class="tt-title" id="tt-title"></div><div id="tt-body"></div></div>
<header>
  <div><div class="logo">TRiGO</div><div class="logo-sub">System Architecture Diagrams — v3.0</div></div>
  <div class="badge">DFD · CLASS · SEQUENCE</div>
</header>
<div class="top-nav">
  <button class="nav-btn active" onclick="switchPanel('dfd',this)"><span class="nav-icon">🌊</span>Data Flow Diagram</button>
  <button class="nav-btn" onclick="switchPanel('class',this)"><span class="nav-icon">🏗</span>Class Diagram</button>
  <button class="nav-btn" onclick="switchPanel('seq',this)"><span class="nav-icon">⏱</span>Sequence Diagram</button>
</div>
<!-- ══════════════════════════════════════════════════════════════
     PANEL 1 — DATA FLOW DIAGRAM
══════════════════════════════════════════════════════════════ -->
<div class="panel active" id="panel-dfd">
<div class="legend">
  <span class="leg-title">Legend:</span>
  <div class="leg-item"><div style="width:12px;height:12px;border-radius:50%;background:#00C9A7;flex-shrink:0"></div>External Entity</div>
  <div class="leg-item"><div class="leg-sq" style="background:rgba(74,158,255,.25);border:1px solid #4A9EFF"></div>Process</div>
  <div class="leg-item"><div style="width:12px;height:8px;background:none;border-left:3px solid #FF6B9D;border-right:3px solid #FF6B9D;flex-shrink:0"></div>Data Store</div>
  <div class="leg-item"><div style="width:24px;height:2px;background:#00C9A7"></div>Data Flow</div>
  <div class="leg-item"><div style="width:24px;height:1px;border-top:2px dashed #5a7870"></div>Optional / Read</div>
  <span style="font-size:9px;color:var(--dim);font-family:'JetBrains Mono',monospace;margin-left:8px">Hover nodes for details</span>
</div>
<div class="diagram-scroll">
<svg width="1720" height="1300" viewBox="0 0 1720 1300">
<defs>
  <marker id="a0" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00C9A7" opacity=".75"/></marker>
  <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4A9EFF" opacity=".75"/></marker>
  <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#4D9DE0" opacity=".75"/></marker>
  <marker id="a3" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#FFB347" opacity=".75"/></marker>
  <marker id="a4" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#B48AE8" opacity=".75"/></marker>
  <marker id="a5" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#FFD700" opacity=".75"/></marker>
  <marker id="a6" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#74C69D" opacity=".75"/></marker>
  <marker id="a7" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#FFA500" opacity=".75"/></marker>
  <filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
</defs>

<!-- Background -->
<rect x="2" y="2" width="1716" height="1296" rx="14" fill="#0e1512" stroke="rgba(0,201,167,.07)" stroke-width="1"/>

<!-- Zone labels -->
<rect x="14" y="14" width="160" height="1268" rx="6" fill="rgba(0,201,167,.025)" stroke="rgba(0,201,167,.07)" stroke-dasharray="4,3"/>
<text x="94" y="34" text-anchor="middle" font-size="7.5" fill="#2a5048" letter-spacing="2">EXTERNAL ACTORS</text>
<rect x="184" y="14" width="1070" height="1268" rx="6" fill="rgba(74,158,255,.018)" stroke="rgba(74,158,255,.06)" stroke-dasharray="4,3"/>
<text x="719" y="34" text-anchor="middle" font-size="7.5" fill="#1a2848" letter-spacing="2">TRIGO PLATFORM — CORE PROCESSING</text>
<rect x="1264" y="14" width="444" height="1268" rx="6" fill="rgba(255,107,157,.018)" stroke="rgba(255,107,157,.06)" stroke-dasharray="4,3"/>
<text x="1486" y="34" text-anchor="middle" font-size="7.5" fill="#4a1828" letter-spacing="2">DATA STORES</text>

<!-- ── EXTERNAL ENTITIES ── -->
<g class="dnode" data-t="CLIENT" data-d="Passenger. Books rides, places deliveries, manages wallet and rewards. Primary data generator.">
  <circle cx="94" cy="115" r="34" fill="rgba(0,201,167,.12)" stroke="#00C9A7" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="110" text-anchor="middle" font-size="16">👤</text>
  <text x="94" y="124" text-anchor="middle" font-size="8.5" fill="#00C9A7" font-weight="700">CLIENT</text>
</g>
<g class="dnode" data-t="DRIVER" data-d="Ride-hailing driver. Submits docs, receives trips, sends GPS location, completes safety checks, manages preferences.">
  <circle cx="94" cy="265" r="34" fill="rgba(77,157,224,.12)" stroke="#4D9DE0" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="260" text-anchor="middle" font-size="16">🚗</text>
  <text x="94" y="274" text-anchor="middle" font-size="8.5" fill="#4D9DE0" font-weight="700">DRIVER</text>
</g>
<g class="dnode" data-t="DELIVERY AGENT" data-d="Parcel fulfillment operator. Receives broadcast orders, confirms pickup, uploads proof photo and recipient signature.">
  <circle cx="94" cy="420" r="34" fill="rgba(255,179,71,.12)" stroke="#FFB347" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="415" text-anchor="middle" font-size="16">📦</text>
  <text x="94" y="429" text-anchor="middle" font-size="8.5" fill="#FFB347" font-weight="700">AGENT</text>
</g>
<g class="dnode" data-t="BUS EMPLOYEE" data-d="Station operator and business owner. Runs onboarding wizard, registers buses, schedules trips, books seats, confirms cargo.">
  <circle cx="94" cy="580" r="34" fill="rgba(180,138,232,.12)" stroke="#B48AE8" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="575" text-anchor="middle" font-size="16">🚌</text>
  <text x="94" y="589" text-anchor="middle" font-size="8.5" fill="#B48AE8" font-weight="700">BUS EMP</text>
</g>
<g class="dnode" data-t="BUS MANAGER" data-d="Operations manager. Phone OTP auth. Monitors assigned stations — trips, occupancy, deliveries, employees. Read-heavy role.">
  <circle cx="94" cy="730" r="34" fill="rgba(180,138,232,.08)" stroke="#B48AE8" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="94" y="725" text-anchor="middle" font-size="16">🏢</text>
  <text x="94" y="739" text-anchor="middle" font-size="8.5" fill="#B48AE8" font-weight="700">BUS MGR</text>
</g>
<g class="dnode" data-t="ADMIN" data-d="Platform administrator. Approves documents, verifies agents and bus employees, configures reward rates and city capacity. Zero Map Locator access.">
  <circle cx="94" cy="890" r="34" fill="rgba(255,215,0,.12)" stroke="#FFD700" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="885" text-anchor="middle" font-size="16">⚙️</text>
  <text x="94" y="899" text-anchor="middle" font-size="8.5" fill="#FFD700" font-weight="700">ADMIN</text>
</g>
<g class="dnode" data-t="MAP LOCATOR (External)" data-d="Independent external platform. TRIGO queries APPROVED POIs read-only via shared DB connection. No writes ever. Used for trip/delivery address search, driver map overlay, and bus station enrichment.">
  <circle cx="94" cy="1060" r="34" fill="rgba(116,198,157,.12)" stroke="#74C69D" stroke-width="1.5" filter="url(#glow)"/>
  <text x="94" y="1055" text-anchor="middle" font-size="16">📍</text>
  <text x="94" y="1069" text-anchor="middle" font-size="8.5" fill="#74C69D" font-weight="700">MAP LOCATOR</text>
</g>

<!-- ── PROCESSES (left column) ── -->
<!-- P1 Auth -->
<g class="dnode" data-t="P1 — Auth &amp; OTP" data-d="Handles registration, login, OTP (EMAIL: Client/Driver/Agent/BusEmp; PHONE: BusManager). Creates User, AuthProvider, UserSession, OTPVerification.">
  <rect x="200" y="80" width="148" height="70" rx="7" fill="rgba(74,158,255,.1)" stroke="#4A9EFF" stroke-width="1.5"/>
  <text x="274" y="103" text-anchor="middle" font-size="8.5" fill="#4A9EFF" font-weight="700">P1 — AUTH &amp; OTP</text>
  <text x="274" y="117" text-anchor="middle" font-size="7.5" fill="#2a4060">VERIFICATION</text>
  <text x="274" y="131" text-anchor="middle" font-size="7.5" fill="#2a4060">User · Session · OTP</text>
  <text x="274" y="143" text-anchor="middle" font-size="7.5" fill="#2a4060">AuthProvider</text>
</g>
<!-- P2 Ride Booking -->
<g class="dnode" data-t="P2 — Ride Booking Engine" data-d="Processes shared and private ride requests. Queries Map Locator POIs for location suggestions. Creates Trip, SharedRideRequest, TripStop. Manages seat allocation, auto-accept, discount and back-to-home flags.">
  <rect x="200" y="200" width="148" height="80" rx="7" fill="rgba(0,201,167,.1)" stroke="#00C9A7" stroke-width="1.5"/>
  <text x="274" y="223" text-anchor="middle" font-size="8.5" fill="#00C9A7" font-weight="700">P2 — RIDE BOOKING</text>
  <text x="274" y="237" text-anchor="middle" font-size="7.5" fill="#1a5048">ENGINE</text>
  <text x="274" y="251" text-anchor="middle" font-size="7.5" fill="#1a5048">Trip · SharedRideReq</text>
  <text x="274" y="265" text-anchor="middle" font-size="7.5" fill="#1a5048">TripStop · Rating</text>
  <text x="274" y="273" text-anchor="middle" font-size="7" fill="#0a3028">TripCancellation · Options</text>
</g>
<!-- P3 Delivery -->
<g class="dnode" data-t="P3 — Delivery Pipeline" data-d="Client creates Delivery (agentId=null, PENDING). System broadcasts to verified Agents. Tracks: PENDING→ASSIGNED→PICKED_UP→IN_TRANSIT→DELIVERED. Full audit via DeliveryEvent. Requires DeliveryPhoto + DeliverySignature on completion.">
  <rect x="200" y="338" width="148" height="80" rx="7" fill="rgba(255,179,71,.1)" stroke="#FFB347" stroke-width="1.5"/>
  <text x="274" y="361" text-anchor="middle" font-size="8.5" fill="#FFB347" font-weight="700">P3 — DELIVERY</text>
  <text x="274" y="375" text-anchor="middle" font-size="7.5" fill="#604020">PIPELINE</text>
  <text x="274" y="389" text-anchor="middle" font-size="7.5" fill="#604020">Delivery · DeliveryEvent</text>
  <text x="274" y="403" text-anchor="middle" font-size="7.5" fill="#604020">Photo · Signature</text>
  <text x="274" y="411" text-anchor="middle" font-size="7" fill="#402810">Agent broadcast</text>
</g>
<!-- P4 Bus Ops -->
<g class="dnode" data-t="P4 — Bus Operations" data-d="Full bus lifecycle: onboarding wizard (BusStandard → BusSeatClass → BusSeat), trip scheduling (BusTrip), seat booking (BusSeatBooking, unique busTripId+busSeatId prevents double-booking), cargo delivery (BusDelivery → BusDeliveryHandoff).">
  <rect x="200" y="470" width="148" height="80" rx="7" fill="rgba(180,138,232,.1)" stroke="#B48AE8" stroke-width="1.5"/>
  <text x="274" y="493" text-anchor="middle" font-size="8.5" fill="#B48AE8" font-weight="700">P4 — BUS OPS</text>
  <text x="274" y="507" text-anchor="middle" font-size="7.5" fill="#4a2870">BusTrip · BusSeat</text>
  <text x="274" y="521" text-anchor="middle" font-size="7.5" fill="#4a2870">Booking · BusDelivery</text>
  <text x="274" y="535" text-anchor="middle" font-size="7.5" fill="#4a2870">Handoff · Standard</text>
  <text x="274" y="543" text-anchor="middle" font-size="7" fill="#2a1848">BusEmployeeStation</text>
</g>
<!-- P5 Rewards -->
<g class="dnode" data-t="P5 — Rewards &amp; Wallet Engine" data-d="Credits reward points on trip completion, referral signup, referral first trip, milestones. Manages point redemption (TRIP_DISCOUNT, WALLET_CREDIT). Wallet balance, Quick Transfer with password confirmation. WalletTransaction ledger with balanceAfter.">
  <rect x="200" y="602" width="148" height="80" rx="7" fill="rgba(255,165,0,.1)" stroke="#FFA500" stroke-width="1.5"/>
  <text x="274" y="625" text-anchor="middle" font-size="8.5" fill="#FFA500" font-weight="700">P5 — REWARDS</text>
  <text x="274" y="639" text-anchor="middle" font-size="8.5" fill="#FFA500" font-weight="700">&amp; WALLET</text>
  <text x="274" y="655" text-anchor="middle" font-size="7.5" fill="#604000">RewardActivity</text>
  <text x="274" y="669" text-anchor="middle" font-size="7.5" fill="#604000">WalletTransaction</text>
  <text x="274" y="677" text-anchor="middle" font-size="7" fill="#402800">RewardRedemption</text>
</g>
<!-- P6 Doc Verify -->
<g class="dnode" data-t="P6 — Document &amp; Verification" data-d="Stores driver/vehicle documents. Tracks expiresAt — EXPIRED docs block Driver going ONLINE. Admin approves/rejects. Manages Agent.verificationStatus and BusEmployee.verificationStatus lifecycle.">
  <rect x="200" y="734" width="148" height="80" rx="7" fill="rgba(255,215,0,.1)" stroke="#FFD700" stroke-width="1.5"/>
  <text x="274" y="757" text-anchor="middle" font-size="8.5" fill="#FFD700" font-weight="700">P6 — DOCUMENT</text>
  <text x="274" y="771" text-anchor="middle" font-size="8.5" fill="#FFD700" font-weight="700">&amp; VERIFICATION</text>
  <text x="274" y="787" text-anchor="middle" font-size="7.5" fill="#604000">Document (expiry)</text>
  <text x="274" y="801" text-anchor="middle" font-size="7.5" fill="#604000">Agent · BusEmployee</text>
  <text x="274" y="809" text-anchor="middle" font-size="7" fill="#402800">VerificationStatus</text>
</g>
<!-- P7 Capacity -->
<g class="dnode" data-t="P7 — Capacity &amp; Waitlist" data-d="Checks CityRideCapacity. If at limit: INSERT DriverWaitlist(WAITING). When slot opens: UPDATE PROMOTED, stamp promotedAt + notifiedAt, push notification to driver.">
  <rect x="200" y="866" width="148" height="70" rx="7" fill="rgba(74,158,255,.08)" stroke="#4A9EFF" stroke-width="1.5"/>
  <text x="274" y="889" text-anchor="middle" font-size="8.5" fill="#4A9EFF" font-weight="700">P7 — CAPACITY</text>
  <text x="274" y="903" text-anchor="middle" font-size="8.5" fill="#4A9EFF" font-weight="700">&amp; WAITLIST</text>
  <text x="274" y="919" text-anchor="middle" font-size="7.5" fill="#2a4060">CityRideCapacity</text>
  <text x="274" y="929" text-anchor="middle" font-size="7.5" fill="#2a4060">DriverWaitlist</text>
</g>

<!-- ── SECONDARY PROCESSES ── -->
<!-- P8 Comms -->
<g class="dnode" data-t="P8 — Communication Hub" data-d="In-trip messaging (TEXT/IMAGE/VOICE/DOCUMENT) with MessageReadReceipt. Call sessions (VOICE/VIDEO): INITIATED→RINGING→ACCEPTED→ENDED. CallEventLog tracks all events. All linked to Trip.">
  <rect x="420" y="200" width="140" height="80" rx="7" fill="rgba(74,158,255,.08)" stroke="#4A9EFF" stroke-width="1"/>
  <text x="490" y="223" text-anchor="middle" font-size="8.5" fill="#4A9EFF" font-weight="700">P8 — COMMS</text>
  <text x="490" y="237" text-anchor="middle" font-size="7.5" fill="#2a4060">HUB</text>
  <text x="490" y="251" text-anchor="middle" font-size="7.5" fill="#2a4060">Message · CallSession</text>
  <text x="490" y="265" text-anchor="middle" font-size="7.5" fill="#2a4060">CallEventLog</text>
  <text x="490" y="273" text-anchor="middle" font-size="7" fill="#1a3050">MessageReadReceipt</text>
</g>
<!-- P9 Location -->
<g class="dnode" data-t="P9 — Location &amp; Map Services" data-d="Manages Location records (PostGIS geometry Point 4326), City boundaries (polygon/radius), DriverLocation live tracking. Queries Map Locator POIs read-only (APPROVED only). Stores SavedPlace. Cross-refs bus stations by coordinates.">
  <rect x="420" y="338" width="140" height="80" rx="7" fill="rgba(116,198,157,.1)" stroke="#74C69D" stroke-width="1"/>
  <text x="490" y="361" text-anchor="middle" font-size="8.5" fill="#74C69D" font-weight="700">P9 — LOCATION</text>
  <text x="490" y="375" text-anchor="middle" font-size="8.5" fill="#74C69D" font-weight="700">&amp; MAP</text>
  <text x="490" y="391" text-anchor="middle" font-size="7.5" fill="#1a4030">Location · City</text>
  <text x="490" y="405" text-anchor="middle" font-size="7.5" fill="#1a4030">DriverLocation</text>
  <text x="490" y="413" text-anchor="middle" font-size="7" fill="#0a2820">SavedPlace · PostGIS</text>
</g>
<!-- P10 Reporting -->
<g class="dnode" data-t="P10 — Reporting &amp; Compliance" data-d="Delivery report lifecycle: PENDING→IN_PROGRESS→RESOLVED/REJECTED/ESCALATED. Stores DeliveryReportAttachment. Admin handles ESCALATED reports. Monitors doc expiry, agent performance metrics.">
  <rect x="420" y="470" width="140" height="80" rx="7" fill="rgba(255,107,157,.1)" stroke="#FF6B9D" stroke-width="1"/>
  <text x="490" y="493" text-anchor="middle" font-size="8.5" fill="#FF6B9D" font-weight="700">P10 — REPORTING</text>
  <text x="490" y="507" text-anchor="middle" font-size="8.5" fill="#FF6B9D" font-weight="700">&amp; COMPLIANCE</text>
  <text x="490" y="523" text-anchor="middle" font-size="7.5" fill="#602040">DeliveryReport</text>
  <text x="490" y="537" text-anchor="middle" font-size="7.5" fill="#602040">ReportAttachment</text>
  <text x="490" y="545" text-anchor="middle" font-size="7" fill="#401030">ESCALATED → Admin</text>
</g>

<script>
// ── Panel switching ──────────────────────────────────────────
function switchPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Sequence sub-tab switching ───────────────────────────────
function showSeq(id, btn) {
  document.querySelectorAll('.seq-flow').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.seq-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('seq-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Tooltip ──────────────────────────────────────────────────
const tt = document.getElementById('tooltip');
const ttTitle = document.getElementById('tt-title');
const ttBody = document.getElementById('tt-body');

document.querySelectorAll('.dnode').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const t = el.dataset.t || el.dataset.title || '';
    const d = el.dataset.d || el.dataset.desc || '';
    if (!t && !d) return;
    ttTitle.textContent = t;
    ttBody.textContent = d;
    tt.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    let x = e.clientX + 16, y = e.clientY + 14;
    if (x + 280 > window.innerWidth) x = e.clientX - 280;
    if (y + 120 > window.innerHeight) y = e.clientY - 100;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  });
  el.addEventListener('mouseleave', () => tt.classList.remove('show'));
});

// Also allow SVG g elements with data-title / data-desc (DFD nodes)
document.querySelectorAll('g[data-t], g[data-title]').forEach(el => {
  if (el.classList.contains('dnode')) return; // already handled
  el.style.cursor = 'pointer';
  el.addEventListener('mouseenter', e => {
    const t = el.dataset.t || el.dataset.title || '';
    const d = el.dataset.d || el.dataset.desc || '';
    if (!t && !d) return;
    ttTitle.textContent = t;
    ttBody.textContent = d;
    tt.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    let x = e.clientX + 16, y = e.clientY + 14;
    if (x + 280 > window.innerWidth) x = e.clientX - 280;
    if (y + 120 > window.innerHeight) y = e.clientY - 100;
    tt.style.left = x + 'px';
    tt.style.top  = y + 'px';
  });
  el.addEventListener('mouseleave', () => tt.classList.remove('show'));
});
</script>
