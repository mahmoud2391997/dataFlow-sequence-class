<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRIGO — Delivery refined (small/large, instant/quote, door/agent)</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;700;800&display=swap');
:root{
  --teal:#00C9A7;--teal2:#00876f;--teal-g:rgba(0,201,167,.14);--teal-g2:rgba(0,201,167,.06);
  --bg:#070b0a;--s1:#0e1512;--s2:#141c19;--s3:#1a2420;
  --border:rgba(0,201,167,.13);--text:#ddeae6;--dim:#5a7870;
  --deliverySoft:#FFB347; --deliveryHard:#c97b2e; --livestock:#b86b2f;
}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;overflow-x:hidden}
header{display:flex;align-items:center;justify-content:space-between;padding:14px 36px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500;backdrop-filter:blur(12px)}
.logo{font-size:22px;font-weight:800;color:var(--teal);letter-spacing:3px}
.logo-sub{font-size:9px;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-top:2px;font-family:'JetBrains Mono',monospace}
.badge{background:var(--teal-g);border:1px solid var(--teal);color:var(--teal);font-size:9px;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:20px;letter-spacing:1.5px}
.top-nav{display:flex;background:var(--s2);border-bottom:2px solid var(--border)}
.nav-btn{flex:1;padding:15px 20px;background:transparent;border:none;color:var(--dim);font-size:12px;font-family:'Syne',sans-serif;font-weight:600;cursor:pointer;transition:all .22s;border-bottom:3px solid transparent;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:-2px;letter-spacing:.5px;text-transform:uppercase}
.nav-btn:hover{color:var(--teal);background:var(--teal-g2)}
.nav-btn.active{color:var(--teal);border-bottom-color:var(--teal);background:rgba(0,201,167,.05)}
.nav-icon{font-size:18px}
.panel{display:none}.panel.active{display:block}
.diagram-scroll{overflow:auto;padding:32px 36px;min-height:calc(100vh - 120px)}
svg text{font-family:'JetBrains Mono',monospace}
.legend{display:flex;gap:16px;flex-wrap:wrap;padding:10px 36px;background:var(--s3);border-bottom:1px solid var(--border);align-items:center}
.leg-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px;font-family:'JetBrains Mono',monospace;margin-right:6px}
.leg-item{display:flex;align-items:center;gap:6px;font-size:10px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.seq-tabs{display:flex;gap:4px;padding:12px 36px;background:var(--s2);border-bottom:1px solid var(--border);overflow-x:auto;white-space:nowrap}
.seq-tab{padding:6px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--dim);font-size:10px;font-family:'JetBrains Mono',monospace;cursor:pointer;transition:all .18s;white-space:nowrap;flex-shrink:0;letter-spacing:.5px}
.seq-tab:hover{border-color:var(--teal);color:var(--teal)}
.seq-tab.active{background:var(--teal);color:var(--bg);border-color:var(--teal);font-weight:700}
.seq-flow{display:none}.seq-flow.active{display:block}
.tt{position:fixed;background:var(--s1);border:1px solid var(--teal);border-radius:8px;padding:10px 14px;max-width:260px;font-size:10.5px;line-height:1.6;z-index:9999;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 8px 28px rgba(0,0,0,.7);font-family:'JetBrains Mono',monospace}
.tt.show{opacity:1}
.tt-title{font-weight:700;color:var(--teal);margin-bottom:4px;font-size:11px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:#00876f;border-radius:2px}
</style>
</head>
<body>
<div class="tt" id="tooltip"><div class="tt-title" id="tt-title"></div><div id="tt-body"></div></div>
<header>
  <div><div class="logo">TRiGO</div><div class="logo-sub">System Architecture — Delivery refined</div></div>
  <div class="badge">SMALL/LARGE · INSTANT/QUOTE · DOOR/AGENT</div>
</header>
<div class="top-nav">
  <button class="nav-btn active" onclick="switchPanel('dfd',this)"><span class="nav-icon">🌊</span>DFD (delivery focus)</button>
  <button class="nav-btn" onclick="switchPanel('class',this)"><span class="nav-icon">🏗</span>Class (delivery entities)</button>
  <button class="nav-btn" onclick="switchPanel('seq',this)"><span class="nav-icon">⏱</span>Delivery flows</button>
</div>

<!-- ========== PANEL 1: DFD (Delivery refined) ========= -->
<div class="panel active" id="panel-dfd">
<div class="legend">
  <span class="leg-title">Delivery types:</span>
  <div class="leg-item"><div style="width:10px;height:10px;background:#FFB347;border-radius:2px"></div>Small package (instant)</div>
  <div class="leg-item"><div style="width:10px;height:10px;background:#c97b2e;border-radius:2px"></div>Large package long (quote)</div>
  <div class="leg-item"><div style="width:10px;height:10px;background:#b86b2f;border-radius:2px"></div>Livestock / removal (direct)</div>
  <span style="font-size:9px;color:var(--dim);margin-left:8px">Door pickup · Agent handoff</span>
</div>
<div class="diagram-scroll">
<svg width="1720" height="1200" viewBox="0 0 1720 1200">
<defs>
  <marker id="a0" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#00C9A7"/></marker>
  <marker id="a1" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#FFB347"/></marker>
  <marker id="a2" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L0,6 L8,3 z" fill="#c97b2e"/></marker>
  <filter id="glow"><feGaussianBlur stdDeviation="2.5"/></filter>
</defs>
<!-- zones -->
<rect x="2" y="2" width="1716" height="1196" rx="14" fill="#0e1512" stroke="rgba(0,201,167,.07)"/>
<!-- external entities -->
<g class="dnode" data-t="CLIENT (sender)" data-d="Initiates delivery, selects package type: small/parcel, large/removal/livestock. Chooses door pickup or dropoff.">
  <circle cx="94" cy="130" r="34" fill="rgba(0,201,167,.12)" stroke="#00C9A7" stroke-width="1.5"/>
  <text x="94" y="125" text-anchor="middle" font-size="16">👤</text>
  <text x="94" y="139" text-anchor="middle" font-size="8.5" fill="#00C9A7">CLIENT</text>
</g>
<g class="dnode" data-t="AGENT (delivery)" data-d="For small packages: door pickup / scan. For large: handoff at hub. For livestock/removal: direct end-to-end.">
  <circle cx="94" cy="310" r="34" fill="rgba(255,179,71,.12)" stroke="#FFB347" stroke-width="1.5"/>
  <text x="94" y="305" text-anchor="middle" font-size="16">📦</text>
  <text x="94" y="319" text-anchor="middle" fill="#FFB347">AGENT</text>
</g>
<g class="dnode" data-t="DRIVER (ride-hailing)" data-d="Used for small instant deliveries (short distance). Picks up from client door, goes direct to destination if short, else to agent hub.">
  <circle cx="94" cy="490" r="34" fill="rgba(77,157,224,.12)" stroke="#4D9DE0" stroke-width="1.5"/>
  <text x="94" y="485" text-anchor="middle" font-size="16">🚗</text>
  <text x="94" y="499" text-anchor="middle" fill="#4D9DE0">DRIVER</text>
</g>
<g class="dnode" data-t="SPECIAL VEHICLE (truck/livestock)" data-d="For large packages (house removal, livestock). Instant if short distance, else requires quotation and scheduling.">
  <circle cx="94" cy="680" r="34" fill="rgba(184,107,47,.12)" stroke="#b86b2f" stroke-width="1.5"/>
  <text x="94" y="675" text-anchor="middle" font-size="16">🚛</text>
  <text x="94" y="689" text-anchor="middle" fill="#b86b2f">SPECIAL</text>
</g>
<!-- processes delivery -->
<g class="dnode" data-t="P3A — Delivery router" data-d="Receives order, classifies size (small/large) and distance (short/long). Routes: small → instant pricing/auto-match; large long → quotation; large short → instant direct.">
  <rect x="220" y="80" width="150" height="80" rx="7" fill="rgba(255,179,71,.1)" stroke="#FFB347" stroke-width="1.5"/>
  <text x="295" y="105" fill="#FFB347" font-weight="700">P3A — DELIVERY ROUTER</text>
  <text x="295" y="120" font-size="7.5" fill="#aa8040">classify size/distance</text>
  <text x="295" y="135" font-size="7.5" fill="#aa8040">small: instant, auto-match</text>
  <text x="295" y="150" font-size="7.5" fill="#aa8040">large short: direct/instant</text>
  <text x="295" y="165" font-size="7.5" fill="#aa8040">large long: quotation</text>
</g>
<g class="dnode" data-t="P3B — Instant pricing & auto‑match" data-d="For small packages (any distance) and large packages (short distance). Calculates dynamic price, matches to nearest driver/vehicle. Door pickup enabled.">
  <rect x="220" y="200" width="150" height="70" rx="7" fill="rgba(255,179,71,.1)" stroke="#FFB347" stroke-width="1.5"/>
  <text x="295" y="225" fill="#FFB347" font-weight="700">P3B — INSTANT</text>
  <text x="295" y="240" font-size="7.5" fill="#aa8040">auto-match + door pickup</text>
  <text x="295" y="255" font-size="7.5" fill="#aa8040">scan at door (small)</text>
  <text x="295" y="270" font-size="7" fill="#785830">large short direct</text>
</g>
<g class="dnode" data-t="P3C — Quotation engine" data-d="For large packages long distance (removal, livestock). Client requests quote, admin/algorithm sets price. After acceptance, schedules special vehicle.">
  <rect x="220" y="320" width="150" height="70" rx="7" fill="rgba(184,107,47,.1)" stroke="#b86b2f" stroke-width="1.5"/>
  <text x="295" y="345" fill="#b86b2f" font-weight="700">P3C — QUOTATION</text>
  <text x="295" y="360" font-size="7.5" fill="#985830">large long, livestock</text>
  <text x="295" y="375" font-size="7.5" fill="#985830">admin pricing / auto-estimate</text>
</g>
<g class="dnode" data-t="P3D — Agent handoff & consolidation" data-d="For small packages going long distance: driver delivers to agent hub, then agent transports to destination. Scan handoff, proof of transfer.">
  <rect x="420" y="80" width="160" height="70" rx="7" fill="rgba(255,179,71,.1)" stroke="#FFB347" stroke-width="1.5"/>
  <text x="500" y="105" fill="#FFB347" font-weight="700">P3D — AGENT HANDOFF</text>
  <text x="500" y="120" font-size="7.5" fill="#aa8040">driver→agent (scan),</text>
  <text x="500" y="135" font-size="7.5" fill="#aa8040">agent→destination</text>
</g>
<g class="dnode" data-t="P3E — Direct large (short distance)" data-d="For house removal truck / livestock short distance. Instant booking, special vehicle goes direct door-to-door without handoff.">
  <rect x="420" y="200" width="160" height="60" rx="7" fill="rgba(184,107,47,.1)" stroke="#b86b2f" stroke-width="1.5"/>
  <text x="500" y="225" fill="#b86b2f" font-weight="700">P3E — DIRECT LARGE</text>
  <text x="500" y="240" font-size="7.5" fill="#985830">short distance, instant</text>
  <text x="500" y="255" font-size="7.5" fill="#985830">truck/livestock direct</text>
</g>
<g class="dnode" data-t="P3F — Door pickup & scan" data-d="Driver/agent scans package at client door (QR / barcode). Confirms pickup, triggers tracking. For small and large short.">
  <rect x="420" y="320" width="160" height="60" rx="7" fill="rgba(74,158,255,.1)" stroke="#4A9EFF" stroke-width="1"/>
  <text x="500" y="345" fill="#4A9EFF" font-weight="700">P3F — DOOR SCAN</text>
  <text x="500" y="360" font-size="7.5" fill="#2a5080">QR / barcode, proof</text>
</g>
<!-- data stores -->
<rect x="660" y="60" width="400" height="48" rx="0" fill="rgba(255,179,71,.05)" stroke="#FFB347" stroke-width="1.2"/>
<text x="670" y="85" fill="#FFB347" font-weight="700">DS4 — DELIVERIES (enhanced)</text>
<text x="670" y="100" font-size="7" fill="#886020">delivery_type: SMALL_PARCEL, LARGE_REMOVAL, LIVESTOCK</text>
<text x="670" y="112" font-size="7" fill="#886020">pricing_model: INSTANT, QUOTE; handoff_required: boolean</text>
<rect x="660" y="130" width="400" height="48" rx="0" fill="rgba(184,107,47,.05)" stroke="#b86b2f" stroke-width="1.2"/>
<text x="670" y="155" fill="#b86b2f" font-weight="700">DS4b — QUOTATIONS</text>
<text x="670" y="170" font-size="7" fill="#886020">quotes (status: REQUESTED, PRICED, ACCEPTED, EXPIRED)</text>
<rect x="660" y="200" width="400" height="48" rx="0" fill="rgba(74,158,255,.05)" stroke="#4A9EFF" stroke-width="1.2"/>
<text x="670" y="225" fill="#4A9EFF" font-weight="700">DS9 — LOCATIONS / ZONES</text>
<text x="670" y="240" font-size="7" fill="#2a5080">distance classification: short/long thresholds per city</text>

<!-- flows: client to router -->
<line x1="128" y1="130" x2="220" y2="120" stroke="#00C9A7" stroke-width="1.5" marker-end="url(#a0)"/>
<text x="170" y="110" fill="#00C9A7" font-size="6.5">delivery request</text>
<!-- router → inst/quotes -->
<line x1="295" y1="160" x2="295" y2="200" stroke="#FFB347" stroke-width="1.5" marker-end="url(#a1)"/>
<text x="310" y="180" fill="#FFB347" font-size="6.5">small, large short</text>
<line x1="295" y1="160" x2="295" y2="320" stroke="#b86b2f" stroke-width="1.5" marker-end="url(#a2)"/>
<text x="315" y="245" fill="#b86b2f" font-size="6.5">large long</text>
<!-- instant → door scan + agent handoff -->
<line x1="370" y1="235" x2="420" y2="235" stroke="#FFB347" stroke-width="1" marker-end="url(#a1)"/>
<text x="395" y="225" fill="#FFB347" font-size="6">door pickup</text>
<line x1="370" y1="250" x2="500" y2="320" stroke="#FFB347" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#a1)"/>
<text x="400" y="280" fill="#FFB347" font-size="6">long → agent handoff</text>
<!-- driver to door scan, agent to handoff etc -->
<line x1="128" y1="490" x2="420" y2="350" stroke="#4D9DE0" stroke-width="1" marker-end="url(#a1)" stroke-dasharray="3,2"/>
<text x="200" y="430" fill="#4D9DE0" font-size="6">door pickup by driver</text>
<line x1="128" y1="310" x2="500" y2="115" stroke="#FFB347" stroke-width="1" marker-end="url(#a1)" stroke-dasharray="3,2"/>
<!-- quotation to special vehicle -->
<line x1="295" y1="390" x2="94" y2="670" stroke="#b86b2f" stroke-width="1.5" marker-end="url(#a2)"/>
<text x="160" y="550" fill="#b86b2f" font-size="6">quote accepted → schedule</text>
<!-- direct large (short) line -->
<line x1="500" y1="260" x2="94" y2="670" stroke="#b86b2f" stroke-width="1" marker-end="url(#a2)"/>
<text x="270" y="500" fill="#b86b2f" font-size="6">short large direct</text>
</svg>
</div>
</div>

<!-- ========== PANEL 2: CLASS diagram (delivery entities refined) ========= -->
<div class="panel" id="panel-class">
<div class="legend"><span class="leg-title">Delivery class refinements</span></div>
<div class="diagram-scroll">
<svg width="1500" height="900">
<rect width="1500" height="900" fill="#0e1512" rx="14"/>
<g class="dnode" data-t="Delivery (enhanced)" data-d="Now includes packageSize (SMALL, LARGE), distanceCategory (SHORT, LONG), pricingModel (INSTANT, QUOTE), handoffRequired: boolean, directSpecialVehicle: boolean.">
  <rect x="80" y="70" width="320" height="240" rx="6" fill="rgba(255,179,71,.08)" stroke="#FFB347" stroke-width="2"/>
  <text x="240" y="95" fill="#FFB347" font-weight="700" font-size="14">Delivery (root)</text>
  <line x1="80" y1="100" x2="400" y2="100" stroke="#FFB347"/>
  <text x="90" y="120" font-size="8" fill="#ccc">id, clientId, agentId, status</text>
  <text x="90" y="140" font-size="8" fill="#FFB347">packageSize: SMALL | LARGE</text>
  <text x="90" y="160" font-size="8" fill="#FFB347">distanceCategory: SHORT | LONG  (based on city threshold)</text>
  <text x="90" y="180" font-size="8" fill="#FFB347">pricingModel: INSTANT | QUOTE</text>
  <text x="90" y="200" font-size="8" fill="#FFB347">handoffRequired: boolean</text>
  <text x="90" y="220" font-size="8" fill="#FFB347">directSpecialVehicle: boolean</text>
  <text x="90" y="240" font-size="8" fill="#ccc">pickupMethod: DOOR | DROP_OFF</text>
  <text x="90" y="260" font-size="8" fill="#ccc">scanCode: String (QR at door)</text>
  <text x="90" y="280" font-size="8" fill="#ccc">quotationId? (if QUOTE)</text>
</g>
<g class="dnode" data-t="Quotation" data-d="For large packages long distance. status: REQUESTED, PRICED, ACCEPTED, EXPIRED. includes adminEstimate, finalPrice, validUntil.">
  <rect x="500" y="70" width="280" height="180" rx="6" fill="rgba(184,107,47,.08)" stroke="#b86b2f" stroke-width="2"/>
  <text x="640" y="95" fill="#b86b2f" font-weight="700" font-size="14">Quotation</text>
  <text x="510" y="120" font-size="8" fill="#ccc">id, deliveryId, status</text>
  <text x="510" y="140" font-size="8" fill="#b86b2f">requestedBy: clientId</text>
  <text x="510" y="160" font-size="8" fill="#b86b2f">estimatedPrice, finalPrice, currency</text>
  <text x="510" y="180" font-size="8" fill="#b86b2f">validUntil, adminId (who priced)</text>
  <text x="510" y="200" font-size="8" fill="#b86b2f">specialVehicleType: REMOVAL_TRUCK | LIVESTOCK</text>
  <text x="510" y="220" font-size="8" fill="#ccc">notes</text>
</g>
<g class="dnode" data-t="HandoffRecord" data-d="When driver → agent for small long-distance. Tracks fromAgent/driver, toAgent, scanProof, location.">
  <rect x="900" y="70" width="280" height="140" rx="6" fill="rgba(74,158,255,.08)" stroke="#4A9EFF" stroke-width="2"/>
  <text x="1040" y="95" fill="#4A9EFF" font-weight="700" font-size="14">HandoffRecord</text>
  <text x="910" y="120" font-size="8" fill="#ccc">id, deliveryId</text>
  <text x="910" y="140" font-size="8" fill="#4A9EFF">fromDriverId?, fromAgentId?</text>
  <text x="910" y="160" font-size="8" fill="#4A9EFF">toAgentId, handoffLocationId</text>
  <text x="910" y="180" font-size="8" fill="#4A9EFF">scanTimestamp, scanCodeVerified</text>
</g>
<!-- relationships: Delivery -> Quotation (0..1), Delivery -> HandoffRecord (0..1) -->
<line x1="400" y1="190" x2="500" y2="130" stroke="#b86b2f" stroke-width="1.5" marker-end="url(#a2)" stroke-dasharray="5,3"/>
<text x="420" y="130" fill="#b86b2f" font-size="7">0..1</text>
<line x1="400" y1="220" x2="900" y2="120" stroke="#4A9EFF" stroke-width="1.5" marker-end="url(#a1)" stroke-dasharray="5,3"/>
<text x="600" y="160" fill="#4A9EFF" font-size="7">handoff</text>
</svg>
</div>
</div>

<!-- ========== PANEL 3: Sequence diagrams for new delivery flows ========= -->
<div class="panel" id="panel-seq">
<div class="seq-tabs">
  <button class="seq-tab active" onclick="showSeq('s3a',this)">① Small parcel (instant, door pickup, agent handoff if long)</button>
  <button class="seq-tab" onclick="showSeq('s3b',this)">② Large short (instant direct, truck/livestock)</button>
  <button class="seq-tab" onclick="showSeq('s3c',this)">③ Large long (quotation → schedule)</button>
</div>
<div class="diagram-scroll">
<!-- 3a: small parcel (door pickup, optional handoff) -->
<svg class="seq-flow active" id="seq-s3a" width="1400" height="900" viewBox="0 0 1400 900">
<rect width="1400" height="900" fill="#0e1512" rx="12"/>
<text x="700" y="30" fill="#FFB347" font-size="14" font-weight="700">① Small parcel (instant) — door pickup, if long → agent handoff</text>
<g font-family="JetBrains Mono,monospace" font-size="8.5">
<rect x="20" y="50" width="90" height="26" fill="rgba(0,201,167,.15)" stroke="#00C9A7"/><text x="65" y="68" fill="#00C9A7">CLIENT</text>
<rect x="150" y="50" width="100" height="26" fill="rgba(74,158,255,.15)" stroke="#4A9EFF"/><text x="200" y="68" fill="#4A9EFF">SYSTEM</text>
<rect x="290" y="50" width="90" height="26" fill="rgba(77,157,224,.15)" stroke="#4D9DE0"/><text x="335" y="68" fill="#4D9DE0">DRIVER</text>
<rect x="420" y="50" width="90" height="26" fill="rgba(255,179,71,.15)" stroke="#FFB347"/><text x="465" y="68" fill="#FFB347">AGENT</text>
<rect x="550" y="50" width="100" height="26" fill="rgba(255,107,157,.15)" stroke="#FF6B9D"/><text x="600" y="68" fill="#FF6B9D">DB</text>
<rect x="690" y="50" width="100" height="26" fill="rgba(74,158,255,.1)" stroke="#4A9EFF" stroke-dasharray="4,3"/><text x="740" y="68" fill="#4A9EFF">NOTIFY</text>
<line x1="65" y1="76" x2="65" y2="850" stroke="#00C9A7" stroke-dasharray="4,4" opacity=".3"/>
<line x1="200" y1="76" x2="200" y2="850" stroke="#4A9EFF" stroke-dasharray="4,4" opacity=".3"/>
<line x1="335" y1="76" x2="335" y2="850" stroke="#4D9DE0" stroke-dasharray="4,4" opacity=".3"/>

<script>
function switchPanel(id, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + id).classList.add('active');
  btn.classList.add('active');
}
function showSeq(id, btn) {
  document.querySelectorAll('.seq-flow').forEach(f => f.classList.remove('active'));
  document.querySelectorAll('.seq-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('seq-' + id).classList.add('active');
  btn.classList.add('active');
}
// tooltip
const tt = document.getElementById('tooltip'), ttTitle = document.getElementById('tt-title'), ttBody = document.getElementById('tt-body');
document.querySelectorAll('.dnode').forEach(el => {
  el.addEventListener('mouseenter', e => {
    const t = el.dataset.t || el.dataset.title || '';
    const d = el.dataset.d || el.dataset.desc || '';
    if (!t && !d) return;
    ttTitle.textContent = t; ttBody.textContent = d; tt.classList.add('show');
  });
  el.addEventListener('mousemove', e => {
    let x = e.clientX + 16, y = e.clientY + 14;
    if (x + 280 > window.innerWidth) x = e.clientX - 280;
    if (y + 120 > window.innerHeight) y = e.clientY - 100;
    tt.style.left = x + 'px'; tt.style.top = y + 'px';
  });
  el.addEventListener('mouseleave', () => tt.classList.remove('show'));
});
</script>
